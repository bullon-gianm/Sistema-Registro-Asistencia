name: Integración Continua - Sistema de Asistencia

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    # Configura Node de forma limpia en el servidor virtual de GitHub
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Instala las dependencias y verifica que el archivo principal inicie sin errores sintácticos
    - name: Validar Servidor de Asistencia
      run: |
        cd backend
        npm install
        node --check server.js
